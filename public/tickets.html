<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Ticket - Party with the sadly happy</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="assets/background.png">
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
    <div class="container">
        <img src="assets/flyer.jpg" alt="Party Flyer" class="flyer-placeholder" onerror="this.style.display='none'">

        <h1>
            <span class="title-party">Party</span>
            <span class="title-with">with</span>
            <span class="title-happy">the</span>
            <span class="title-sadly">sadly</span>
            <span class="title-happy">happy</span>
        </h1>
        <h3>July 5th, 2026</h3>
        
        <input type="email" id="email" placeholder="Enter your email" required>
        <p class="ticket-description">Gate Pass — ₦100</p>
        <input type="hidden" id="ticketType" value="Gate Pass" data-price="100">
        <button onclick="payWithPaystack()">Purchase Gate Pass</button>
        <button type="button" class="secondary-button" onclick="openAdmin()">Check Ticket</button>
        <div id="ticketDisplay" style="display:none;"></div>
    </div>

    <script>
        const PAYSTACK_PUBLIC_KEY = 'pk_live_ec5bbe6ffd52d09c51e75d2f79cc3bd97901d113';

        function payWithPaystack() {
            const email = document.getElementById('email').value;
            const ticket = document.getElementById('ticketType');
            const type = ticket.value;
            const price = Number(ticket.dataset.price) * 100;

            if(!email) return alert('Please enter your email');

            let handler = PaystackPop.setup({
                key: PAYSTACK_PUBLIC_KEY,
                email: email,
                amount: price,
                currency: 'NGN',
                channels: ['bank_transfer', 'card'], 
                callback: function(response) {
                    fetch('/verify-payment', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        // 👇 THIS IS THE LINE WE UPDATED 👇
                        body: JSON.stringify({ reference: response.reference, ticketType: type, email: email })
                    })
                    .then(res => res.json())
                    .then(data => {
                        const display = document.getElementById('ticketDisplay');
                        display.style.display = 'block';
                        if(data.success) {
                            display.innerHTML = `
                                <span style="color: green; font-weight: 700;">Payment Successful!</span><br>
                                <p style="margin: 8px 0 2px;">Your ${data.type} ID:</p>
                                <span style="font-size: 28px; color: #000; letter-spacing: 2px; display: inline-block; margin-bottom: 8px;">${data.ticketId}</span><br>
                                <p style="margin: 8px 0 0;"><strong>Venue:</strong> ${data.venue}</p>
                                <p style="margin: 12px 0 0; font-weight: 700;">Screenshot or copy this Ticket ID and save it securely.</p>
                                <small>We have also sent a copy to your email.</small>`;
                        } else {
                            display.innerHTML = `<span style="color: red;">${data.error}</span>`;
                        }
                    });
                },
                onClose: function() { alert('Transaction cancelled.'); }
            });
            handler.openIframe();
        }

        function openAdmin() {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
